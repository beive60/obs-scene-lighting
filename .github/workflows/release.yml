name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure CMake
        run: cmake --preset windows-x64

      - name: Build
        run: cmake --build build_x64 --config RelWithDebInfo

      - name: Package with CPack
        run: cpack -G NSIS -C RelWithDebInfo -B build_x64
        working-directory: build_x64

      - name: Sign artifacts
        if: ${{ vars.CODE_SIGN_THUMBPRINT != '' }}
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path build_x64 -Filter "obs-scene-lighting-*-windows-x64.exe" |
            Select-Object -First 1 -ExpandProperty FullName
          $dll = "build_x64\RelWithDebInfo\obs-scene-lighting.dll"

          $filesToSign = @()
          if (Test-Path $dll) { $filesToSign += $dll }
          if ($installer -and (Test-Path $installer)) { $filesToSign += $installer }

          foreach ($file in $filesToSign) {
            signtool sign /sha1 "${{ vars.CODE_SIGN_THUMBPRINT }}" /fd sha256 `
              /tr http://timestamp.digicert.com /td sha256 /v $file
            if ($LASTEXITCODE -ne 0) { throw "signtool failed for $file" }
          }

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $installer = Get-ChildItem -Path build_x64 -Filter "obs-scene-lighting-*-windows-x64.exe" |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $installer) {
            throw "Installer not found in build_x64"
          }

          gh release create "${{ github.ref_name }}" $installer `
            --title "Release ${{ github.ref_name }}" `
            --generate-notes
